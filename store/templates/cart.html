{% extends 'base.html' %}

{% load static %}
{% block title %}Cart{% endblock %}

{% block content %}
<div class="container mx-auto my-8">
  <h1 class="text-3xl font-semibold mb-4">Shopping Cart</h1>
  <table class="min-w-full bg-white border border-gray-300">
    <thead>
      <tr>
        <th class="py-2 px-4 border-b">Product</th>
        <th class="py-2 px-4 border-b">Quantity</th>
        <th class="py-2 px-4 border-b">Price</th>
        <th class="py-2 px-4 border-b">Total</th>
        <th class="py-2 px-4 border-b">Actions</th>
      </tr>
    </thead>
    <tbody id="cartItemsContainer">
      <!-- Cart items will be dynamically added here -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="3" class="py-2 px-4 border-t font-semibold">Cart Total</td>
        <td id="cartTotal" class="py-2 px-4 border-t"></td>
        <td class="py-2 px-4 border-t"></td>
      </tr>
    </tfoot>
  </table>
  <div class="mt-8 flex justify-end">
    <a href="{% url 'checkout' %}" class="bg-blue-500 text-white px-4 py-2 rounded-md">Proceed to Checkout</a>
  </div>
</div>

{% block additional_scripts %}

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="{% static 'js/cart.js' %}"></script>

    
{% endblock %}

{% endblock %}
