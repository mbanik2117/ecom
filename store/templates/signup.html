


{% extends 'base.html' %}

{% load static %}

{% block title %}Register{% endblock %}

{% block additional_css %}
    <!-- Additional CSS specific to the register template -->
    <style>
        /* Your existing CSS styles */
        body {
            background-color: #f3f4f6; /* Set a light background color */
        }

        .container {
            max-width: 600px; /* Set a max-width for better readability */
        }

        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a5568;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #d2d6dc;
            border-radius: 4px;
        }

        button {
            background-color: #4299e1;
            color: #ffffff;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3182ce;
        }
    </style>
{% endblock %}

{% block content %}
    {% load static %}  <!-- Add this line to load the static tag -->
    <div class="text-center">
        <h1 class="text-3xl font-semibold text-gray-800">Register</h1>
    </div>

    <div class="mt-8">
        <form id="signup-form" method="post" action="">
            {% csrf_token %}
            <div class="mb-4">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="mb-4">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="mb-4">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="{% static 'js/signup.js' %}"></script>
{% endblock %}
