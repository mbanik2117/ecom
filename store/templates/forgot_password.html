<!-- forgot_password.html -->

{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
    <div class="container mx-auto flex justify-center items-center h-screen">
        <div class="w-full max-w-md">
            <div class="text-center">
                <h1 class="text-3xl font-semibold text-gray-800">Forgot Password</h1>
            </div>

            <div class="mt-8">
                <form action="{% url 'forgot_password' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="email" class="block text-gray-700">Email</label>
                        <input type="email" id="email" name="email" class="w-full px-4 py-2 border rounded-md" required>
                    </div>
                    <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded-md">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
